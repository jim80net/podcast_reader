name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for the cuda-pack-smoke job (S9 follow-up); the regular
  # jobs run too, which is harmless.
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Sync dependencies
        run: uv sync --extra dev --extra chapters
      - name: Unit tests
        run: uv run pytest -m "not integration" -q
      - name: Type check (strict)
        run: uv run mypy src/
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format check
        run: uv run ruff format --check src/ tests/

  frozen-smoke:
    # Builds the REAL frozen engine (task 7.2 — the spike stub is retired;
    # spike/ stays as evidence) and proves it end-to-end: boot with a temp
    # data dir -> authed handshake (token from engine-state.json, ready
    # sentinel, discovery file, /v1/health) -> health version == pyproject
    # version (per S3) -> POST /v1/packs/model-tiny/install -> 5 s fixture
    # WAV job on CPU -> done + non-empty HTML.
    #
    # Full e2e on BOTH legs (per Q1). If demonstrated flake ever forces a
    # downgrade, the ubuntu leg MAY drop to boot-only (--boot-only); the
    # windows leg keeps the full e2e — Windows is where the frozen path
    # actually ships.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Cache tool seed downloads
        # Keyed on the build script (same pattern as the model pack cache
        # below): fetch_tool_sources reuses any cached file by name, so a
        # URL/asset change must invalidate the cache or CI would keep
        # seeding stale binaries.
        uses: actions/cache@v4
        with:
          path: packaging/.tool-cache
          key: tool-seeds-${{ runner.os }}-v1-${{ hashFiles('packaging/build_engine.py') }}
      - name: Cache installed tiny model pack
        # Keyed on the registry (any pin bump re-downloads). The data dir is
        # reused, so a cache hit makes the install POST an idempotent no-op
        # while a miss exercises the full download path.
        uses: actions/cache@v4
        with:
          path: smoke-data/models
          key: model-tiny-${{ runner.os }}-${{ hashFiles('src/podcast_reader/engine/packs.py') }}
      - name: Build frozen engine (worker extra + PyInstaller)
        run: |
          uv venv packaging/.venv-engine --python 3.10
          VENV_PY=packaging/.venv-engine/bin/python
          [ -e packaging/.venv-engine/Scripts/python.exe ] && VENV_PY=packaging/.venv-engine/Scripts/python.exe
          uv pip install --python "$VENV_PY" '.[worker]' pyinstaller
          "$VENV_PY" packaging/build_engine.py
      - name: Frozen smoke (boot, handshake, tiny pack install, transcribe)
        run: |
          ENGINE=packaging/dist/engine/podcast-reader-engine
          [ -e "$ENGINE.exe" ] && ENGINE="$ENGINE.exe"
          uv run python packaging/frozen_smoke.py "$ENGINE" --data-dir smoke-data

  cuda-pack-smoke:
    # S9 follow-up (workflow_dispatch only, not v1-blocking): install the
    # CUDA pack through POST /v1/packs/cuda-runtime/install on a stock
    # Windows runner — no GPU needed — and verify wheel extraction produced
    # the complete cuBLAS + cuDNN 9 DLL set with an intact manifest. This
    # exercises the largest download/extraction path on the platform that
    # ships it (~1.2 GB from PyPI).
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Build frozen engine (no tool seeds — not needed for this smoke)
        run: |
          uv venv packaging/.venv-engine --python 3.10
          VENV_PY=packaging/.venv-engine/Scripts/python.exe
          uv pip install --python "$VENV_PY" '.[worker]' pyinstaller
          "$VENV_PY" packaging/build_engine.py --skip-tools
      - name: Install the CUDA pack and verify extraction + manifest
        run: |
          uv run python packaging/frozen_smoke.py \
            packaging/dist/engine/podcast-reader-engine.exe \
            --pack cuda-runtime --no-transcribe --timeout 1800

  node:
    # Desktop app (app/): typecheck, lint, unit tests, production build.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # >= 23.6 required: the e2e mock engine runs .ts via native type stripping
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Packaging pipeline proof (engine-less linux dir build)
        run: node scripts/dist.mjs --linux dir

  extension:
    # Chrome extension (extension/): typecheck, lint, unit tests, MV3 build,
    # then Playwright e2e under xvfb against the app's mock engine
    # (../app/tests/mock-engine — node builtins only, no app npm install
    # needed). Design decision 13: one job mirroring the node job's shape.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # >= 23.6 required: the e2e mock engine runs .ts via native type stripping
          node-version: 24
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build (vite MV3 + deterministic zip)
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('extension/package-lock.json') }}
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Mock-engine e2e (xvfb — extensions need a headed Chromium)
        run: xvfb-run -a npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: extension-playwright-results
          path: extension/test-results/

  app-e2e:
    # Playwright e2e against the mock engine, then the real-engine smoke
    # (integration project) against `uv run podcast-reader serve`.
    # Installer builds for tags are deferred until signing credentials exist —
    # see .github/workflows/release.yml (tasks 6.4-6.6).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Sync Python engine (dev posture for the real-engine smoke)
        run: uv sync --extra dev
        working-directory: .
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Build app
        run: npm run build
      - name: Mock-engine e2e + real-engine smoke (xvfb)
        run: xvfb-run -a npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: app/test-results/
          retention-days: 14
          if-no-files-found: error
