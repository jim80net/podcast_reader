# Unsigned Windows test installer — for hands-on testing, NOT a release.
#
# Manual-only (workflow_dispatch). Builds the real frozen engine + the NSIS
# installer on a Windows runner and uploads the .exe as a downloadable
# workflow ARTIFACT — it never publishes a GitHub Release and never signs.
# This respects the app-packaging rule "unsigned artifacts must never be
# published as release installers": a workflow artifact is a test build you
# fetch from the run, not a published release. A warning-free *release*
# installer still requires signing (issue #20 / release.yml).
#
# The installed app WILL trip Windows SmartScreen once (unsigned) — click
# "More info" -> "Run anyway". The bundled frozen engine means it runs with no
# Python/uv on the test machine.
name: Test installer (unsigned, Windows)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/sha to build (default: the selected ref)'
        required: false
        default: ''

jobs:
  windows-test-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      # Real frozen engine onedir (same recipe as the frozen-smoke CI job):
      # engine + whisper-worker entry points, tool seeds (yt-dlp/ffmpeg) staged
      # into _internal/tools/ so the installed app is self-contained.
      - name: Build frozen engine
        run: |
          uv venv packaging/.venv-engine --python 3.10
          VENV_PY=packaging/.venv-engine/Scripts/python.exe
          uv pip install --python "$VENV_PY" '.[worker]' pyinstaller
          "$VENV_PY" packaging/build_engine.py
      - name: Install app deps
        run: npm ci
        working-directory: app
      # --publish never: build the NSIS installer locally into app/dist/ and do
      # NOT publish. electron-builder otherwise auto-publishes in CI when a
      # `publish` config is present (failing on the missing GH_TOKEN). No signing
      # secrets are referenced either, so the build is unsigned (test only).
      - name: Build unsigned NSIS installer
        run: npm run dist -- --engine-dir ../packaging/dist/engine --win --publish never
        working-directory: app
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-reader-windows-unsigned-${{ github.sha }}
          path: app/dist/*.exe
          retention-days: 14
          if-no-files-found: error

      # ---- install-and-run proof (venture increment W2) --------------------
      # The artifact above is a FILE; the steps below prove it is a PRODUCT:
      # silent install, launch the INSTALLED app (real frozen engine, nothing
      # mocked), assert the engine handshake, walk first-run -> submit a
      # YouTube URL -> Reader with screenshots, then uninstall cleanly.
      # /S (silent) also means the unsigned build never hits the INTERACTIVE
      # SmartScreen dialog — that prompt only guards interactive launches.
      - name: Install silently (NSIS /S)
        run: |
          INSTALLER=$(ls app/dist/*.exe)
          echo "installer: $INSTALLER"
          powershell -Command "Start-Process -FilePath '$(cygpath -w "$INSTALLER")' -ArgumentList '/S' -Wait"
          # electron-builder NSIS per-user layout (verified from run
          # 29316962855's own listing): %LOCALAPPDATA%\Programs\<package name>
          # containing "<productName>.exe". Poll rather than trust process
          # exit — NSIS finishes asynchronously in some shells.
          INSTALLED="$LOCALAPPDATA/Programs/podcast-reader-app/Podcast Reader.exe"
          for i in $(seq 1 60); do
            [ -f "$INSTALLED" ] && break
            sleep 2
          done
          [ -f "$INSTALLED" ] || { echo "installed exe not found"; ls "$LOCALAPPDATA/Programs" || true; exit 1; }
          echo "INSTALLED_EXE=$INSTALLED" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$(dirname "$INSTALLED")" >> "$GITHUB_ENV"
      - name: Walk the installed app (engine handshake + screenshots)
        run: node tests/install/walkthrough.mjs --exe "$INSTALLED_EXE" --out "$RUNNER_TEMP/walkthrough"
        working-directory: app
      - name: Upload walkthrough screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkthrough-${{ github.sha }}
          path: ${{ runner.temp }}/walkthrough/
          retention-days: 14
          if-no-files-found: error
      - name: Uninstall silently and verify no residue
        if: always()
        run: |
          [ -n "$INSTALL_DIR" ] || { echo "no install dir recorded (install failed earlier)"; exit 0; }
          UNINSTALLER="$INSTALL_DIR/Uninstall Podcast Reader.exe"
          [ -f "$UNINSTALLER" ] || { echo "uninstaller not found at $UNINSTALLER"; ls "$INSTALL_DIR"; exit 1; }
          powershell -Command "Start-Process -FilePath '$(cygpath -w "$UNINSTALLER")' -ArgumentList '/S' -Wait"
          # The NSIS uninstaller re-execs itself from %TEMP%, so -Wait returns
          # early; poll for the install dir to disappear.
          for i in $(seq 1 45); do
            [ ! -d "$INSTALL_DIR" ] && break
            sleep 2
          done
          if [ -d "$INSTALL_DIR" ]; then
            echo "install dir still present after uninstall:"; ls "$INSTALL_DIR"; exit 1
          fi
          echo "uninstall clean: $INSTALL_DIR removed"
          # Note: per-user app data (%APPDATA%) intentionally survives —
          # deleteAppDataOnUninstall is false by design (update-friendly);
          # the runner is ephemeral.
