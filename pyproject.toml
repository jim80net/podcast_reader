[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "podcast-reader"
version = "0.1.0"
description = "Transcribe podcast audio or YouTube/X videos to styled HTML transcripts"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.40",
    "youtube-transcript-api>=1.0",
    "yt-dlp>=2024.1.1",
]

[project.optional-dependencies]
whisper = [
    "whisper-ctranslate2>=0.5.7",
]
diarization = [
    "pyannote.audio>=4.0",
]
dev = [
    "pytest>=7.0",
    "mypy>=1.10",
    "ruff>=0.4",
]

[project.scripts]
podcast-reader = "podcast_reader.cli:main"

[tool.mypy]
strict = true

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH"]

[tool.pytest.ini_options]
markers = [
    "integration: tests that download from the internet or require external tools",
]
