<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      script-src includes 'unsafe-inline' deliberately: the Reader injects the
      engine's self-contained transcript artifact via a sandboxed iframe
      srcdoc (design decision 8), and srcdoc documents INHERIT this CSP — the
      artifact's inline chapter scroll-sync script (html.py) would otherwise
      be blocked. CSP cannot be scoped per-frame, so the app chrome
      compensates by never using innerHTML (see dom.ts); the artifact itself
      is contained by the iframe sandbox (allow-scripts only, opaque origin).
      frame-src about: permits the srcdoc frame itself.

      Media playback (floating-video-player): media-src app: permits the
      <video>/<audio> elements to load engine media via the main-mediated
      privileged app:// scheme (the renderer never holds the engine token).
      frame-src youtube-nocookie permits the YouTube embed; there is NO
      script-src allowance for youtube.com — the embed is driven via the raw
      cross-origin-iframe postMessage protocol, so no third-party JS runs in
      this window (design F1). Every delta is inherited by the srcdoc artifact
      too (CSP is not per-frame, F2); they are kept minimal for that reason.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-src 'self' about: https://www.youtube-nocookie.com; media-src app:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Reader</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
